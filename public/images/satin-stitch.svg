<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="400" height="200" fill="white"/>
    
    <!-- Satin Stitch Demonstration -->
    <g transform="translate(100, 50)">
        <!-- Base Shape -->
        <path d="M 20,20 L 180,20 L 180,80 L 20,80 Z" fill="#FDF2F7"/>
        
        <!-- Stitch Lines -->
        <g stroke="#808000" stroke-width="2">
            <line x1="30" y1="25" x2="30" y2="75"/>
            <line x1="50" y1="25" x2="50" y2="75"/>
            <line x1="70" y1="25" x2="70" y2="75"/>
            <line x1="90" y1="25" x2="90" y2="75"/>
            <line x1="110" y1="25" x2="110" y2="75"/>
            <line x1="130" y1="25" x2="130" y2="75"/>
            <line x1="150" y1="25" x2="150" y2="75"/>
            <line x1="170" y1="25" x2="170" y2="75"/>
        </g>
        
        <!-- Border -->
        <rect x="20" y="20" width="160" height="60" fill="none" stroke="#2D3436" stroke-width="1"/>
    </g>
    
    <!-- Title -->
    <text x="200" y="150" text-anchor="middle" font-family="Arial" font-size="16" fill="#2D3436">Satin Stitch</text>
</svg>
