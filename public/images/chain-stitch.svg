<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="400" height="200" fill="white"/>
    
    <!-- Chain Stitch Demonstration -->
    <g transform="translate(50, 50)">
        <!-- Thread Path -->
        <path d="M 20,50 Q 40,20 60,50 Q 80,80 100,50 Q 120,20 140,50 Q 160,80 180,50" 
              fill="none" stroke="#808000" stroke-width="3"/>
        
        <!-- Stitch Points -->
        <circle cx="20" cy="50" r="3" fill="#2D3436"/>
        <circle cx="60" cy="50" r="3" fill="#2D3436"/>
        <circle cx="100" cy="50" r="3" fill="#2D3436"/>
        <circle cx="140" cy="50" r="3" fill="#2D3436"/>
        <circle cx="180" cy="50" r="3" fill="#2D3436"/>
        
        <!-- Direction Arrows -->
        <path d="M 90,20 L 100,30 L 110,20" fill="none" stroke="#2D3436" stroke-width="2"/>
    </g>
    
    <!-- Title -->
    <text x="200" y="150" text-anchor="middle" font-family="Arial" font-size="16" fill="#2D3436">Chain Stitch</text>
</svg>
