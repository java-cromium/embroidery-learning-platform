<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" version="1.1" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
 <rect width="800" height="400" fill="#e8e8e8"/>
 <!-- Industrial sewing machine inspired design -->
 <g transform="translate(200,100)" stroke="#333" fill="none">
   <!-- Machine base -->
   <rect x="0" y="150" width="400" height="50" stroke-width="4"/>
   <!-- Machine body -->
   <path d="M100,0 v150 h200 v-150 c0,-30 -200,-30 -200,0" stroke-width="4"/>
   <!-- Wheel -->
   <circle cx="250" cy="50" r="30" stroke-width="4"/>
   <!-- Needle mechanism -->
   <path d="M150,50 v100" stroke-width="4"/>
   <circle cx="150" cy="160" r="5" fill="#333"/>
   <!-- Decorative gears -->
   <g stroke-width="2">
     <circle cx="300" cy="70" r="15"/>
     <circle cx="330" cy="70" r="15"/>
     <path d="M300,70 l15,-15 l15,15 l-15,15 l-15,-15"/>
     <path d="M330,70 l15,-15 l15,15 l-15,15 l-15,-15"/>
   </g>
 </g>
</svg>
