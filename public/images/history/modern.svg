<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" version="1.1" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
 <rect width="800" height="400" fill="#ffffff"/>
 <!-- Modern abstract embroidery design -->
 <g transform="translate(400,200)">
   <!-- Digital grid background -->
   <g stroke="#e0e0e0" stroke-width="1">
     <path d="M-200,-200 h400 M-200,-100 h400 M-200,0 h400 M-200,100 h400 M-200,200 h400"/>
     <path d="M-200,-200 v400 M-100,-200 v400 M0,-200 v400 M100,-200 v400 M200,-200 v400"/>
   </g>
   <!-- Modern embroidery elements -->
   <g stroke="#4f772d" stroke-width="4" fill="none">
     <!-- Abstract floral pattern -->
     <path d="M0,0 c50,-50 100,-50 150,0 c-50,50 -100,50 -150,0"/>
     <path d="M0,0 c-50,-50 -100,-50 -150,0 c50,50 100,50 150,0"/>
     <path d="M0,0 c50,50 50,100 0,150 c-50,-50 -50,-100 0,-150"/>
     <path d="M0,0 c-50,50 -50,100 0,150 c50,-50 50,-100 0,-150"/>
   </g>
   <!-- Digital elements -->
   <g fill="#4f772d">
     <circle cx="75" cy="75" r="5"/>
     <circle cx="-75" cy="75" r="5"/>
     <circle cx="75" cy="-75" r="5"/>
     <circle cx="-75" cy="-75" r="5"/>
     <rect x="-2.5" y="-2.5" width="5" height="5"/>
   </g>
 </g>
</svg>
