<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" version="1.1" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
 <rect width="800" height="400" fill="#2c3e50"/>
 <!-- Byzantine mosaic-like pattern -->
 <g transform="translate(400,200)">
   <!-- Gold circular frame -->
   <circle r="150" fill="none" stroke="#ffd700" stroke-width="8"/>
   <!-- Cross pattern -->
   <path d="M0,-120 v240 M-120,0 h240" stroke="#ffd700" stroke-width="12"/>
   <!-- Decorative elements -->
   <g fill="#ffd700">
     <circle cx="0" cy="0" r="30"/>
     <circle cx="90" cy="0" r="20"/>
     <circle cx="-90" cy="0" r="20"/>
     <circle cx="0" cy="90" r="20"/>
     <circle cx="0" cy="-90" r="20"/>
   </g>
   <!-- Curved decorative lines -->
   <g fill="none" stroke="#ffd700" stroke-width="4">
     <path d="M45,45 A60,60 0 0 1 90,0"/>
     <path d="M-45,45 A60,60 0 0 0 -90,0"/>
     <path d="M45,-45 A60,60 0 0 0 90,0"/>
     <path d="M-45,-45 A60,60 0 0 1 -90,0"/>
   </g>
 </g>
</svg>
