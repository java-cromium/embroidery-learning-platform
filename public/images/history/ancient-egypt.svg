<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" version="1.1" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
 <rect width="800" height="400" fill="#f4e4bc"/>
 <!-- Hieroglyphic border -->
 <g fill="#8b4513" transform="translate(20,20)">
   <rect x="0" y="0" width="760" height="360" fill="none" stroke="#8b4513" stroke-width="4"/>
   <g transform="translate(30,30)">
     <!-- Stylized ancient Egyptian embroidery patterns -->
     <path d="M0,0 l20,0 l-10,20 z" fill="#8b4513"/>
     <path d="M40,0 c0,20 20,20 20,0" fill="none" stroke="#8b4513" stroke-width="2"/>
     <path d="M80,0 l0,20 l20,-20 l0,20" fill="none" stroke="#8b4513" stroke-width="2"/>
   </g>
   <!-- Repeat pattern around border -->
   <use href="#egyptianPattern" x="120" y="0"/>
   <use href="#egyptianPattern" x="240" y="0"/>
 </g>
 <!-- Central embroidery design -->
 <g transform="translate(400,200)">
   <circle r="100" fill="none" stroke="#8b4513" stroke-width="4"/>
   <path d="M-70,-70 Q0,-140 70,-70 Q140,0 70,70 Q0,140 -70,70 Q-140,0 -70,-70" 
         fill="none" stroke="#8b4513" stroke-width="4"/>
 </g>
</svg>
