<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" version="1.1" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
 <rect width="200" height="200" fill="#f8f9fa"/>
 <!-- Guide line -->
 <path d="M100 40v120" fill="none" stroke="#e5e7eb" stroke-dasharray="4" stroke-width="1"/>
 <!-- Feather stitch -->
 <g fill="none" stroke="#4f772d" stroke-width="3">
   <path d="M100 40 L85 55 L100 70 L115 85 L100 100 L85 115 L100 130 L115 145 L100 160"/>
 </g>
 <!-- Stitch points -->
 <g fill="#4f772d">
   <circle cx="100" cy="40" r="2"/>
   <circle cx="85" cy="55" r="2"/>
   <circle cx="100" cy="70" r="2"/>
   <circle cx="115" cy="85" r="2"/>
   <circle cx="100" cy="100" r="2"/>
   <circle cx="85" cy="115" r="2"/>
   <circle cx="100" cy="130" r="2"/>
   <circle cx="115" cy="145" r="2"/>
   <circle cx="100" cy="160" r="2"/>
 </g>
 <!-- Direction arrows -->
 <g fill="none" stroke="#6b7280" stroke-width="1">
   <path d="M95 45l-5 5"/>
   <path d="M90 65l5 5"/>
   <path d="M105 80l5 5"/>
   <path d="M95 105l-5 5"/>
   <path d="M90 125l5 5"/>
   <path d="M105 140l5 5"/>
 </g>
</svg>
