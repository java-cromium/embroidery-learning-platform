<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" version="1.1" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
 <rect width="200" height="200" fill="#f8f9fa"/>
 <!-- Guide line -->
 <path d="M40 100h120" fill="none" stroke="#e5e7eb" stroke-dasharray="4" stroke-width="1"/>
 <!-- Split stitch -->
 <g stroke="#4f772d" stroke-width="3">
   <!-- Base stitches -->
   <line x1="40" y1="100" x2="70" y2="100"/>
   <line x1="60" y1="100" x2="90" y2="100"/>
   <line x1="80" y1="100" x2="110" y2="100"/>
   <line x1="100" y1="100" x2="130" y2="100"/>
   <line x1="120" y1="100" x2="150" y2="100"/>
   <line x1="140" y1="100" x2="160" y2="100"/>
 </g>
 <!-- Split points -->
 <g fill="#4f772d">
   <circle cx="40" cy="100" r="2"/>
   <circle cx="65" cy="100" r="2"/>
   <circle cx="85" cy="100" r="2"/>
   <circle cx="105" cy="100" r="2"/>
   <circle cx="125" cy="100" r="2"/>
   <circle cx="145" cy="100" r="2"/>
   <circle cx="160" cy="100" r="2"/>
 </g>
 <!-- Split indicators -->
 <g stroke="#6b7280" stroke-width="1">
   <path d="M65 95v10"/>
   <path d="M85 95v10"/>
   <path d="M105 95v10"/>
   <path d="M125 95v10"/>
   <path d="M145 95v10"/>
 </g>
</svg>
