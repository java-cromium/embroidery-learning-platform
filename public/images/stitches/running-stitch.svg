   <line x1="40" y1="100" x2="55" y2="100"/>
   <line x1="70" y1="100" x2="85" y2="100"/>
   <line x1="100" y1="100" x2="115" y2="100"/>
   <line x1="130" y1="100" x2="145" y2="100"/>
 </g>
 <!-- Stitch points -->
 <g fill="#4f772d">
   <circle cx="40" cy="100" r="2"/>
   <circle cx="55" cy="100" r="2"/>
   <circle cx="70" cy="100" r="2"/>
   <circle cx="85" cy="100" r="2"/>
   <circle cx="100" cy="100" r="2"/>
   <circle cx="115" cy="100" r="2"/>
   <circle cx="130" cy="100" r="2"/>
   <circle cx="145" cy="100" r="2"/>
   <circle cx="160" cy="100" r="2"/>
 </g>
 <!-- Direction arrow -->
